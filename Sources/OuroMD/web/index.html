<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="vditor/dist/index.css">
<style>
  /* Open Sans — Typora's Github-theme body font (Apache-2.0). Bundled so the
     reading surface matches regardless of installed system fonts. */
  @font-face { font-family: "Open Sans"; font-style: normal; font-weight: 400; font-display: swap; src: url("fonts/open-sans-400.woff2") format("woff2"); }
  @font-face { font-family: "Open Sans"; font-style: italic; font-weight: 400; font-display: swap; src: url("fonts/open-sans-400i.woff2") format("woff2"); }
  @font-face { font-family: "Open Sans"; font-style: normal; font-weight: 700; font-display: swap; src: url("fonts/open-sans-700.woff2") format("woff2"); }
  @font-face { font-family: "Open Sans"; font-style: italic; font-weight: 700; font-display: swap; src: url("fonts/open-sans-700i.woff2") format("woff2"); }
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { min-height: 100vh; }
  /* The native window owns the chrome; keep the editor toolbar hidden for a
     distraction-free, content-first surface. */
  .vditor-toolbar { display: none !important; }
  /* Brief pulse when the open file is reloaded from an external (agent) edit. */
  @keyframes ouroFlash { 0% { background-color: rgba(255, 221, 87, 0.40); } 100% { background-color: transparent; } }
  .vditor-reset.ouro-flash { animation: ouroFlash 0.9s ease-out; }
</style>
<!-- Swapped at runtime by the native app to apply the active theme. -->
<style id="ouro-theme"></style>
</head>
<body>
  <div id="editor"></div>
  <script src="vditor/dist/index.min.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
