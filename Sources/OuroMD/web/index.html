<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="vditor/dist/index.css">
<style>
  /* Open Sans — Typora's Github-theme body font (Apache-2.0). Bundled so the
     reading surface matches regardless of installed system fonts. */
  @font-face { font-family: "Open Sans"; font-style: normal; font-weight: 400; font-display: swap; src: url("fonts/open-sans-400.woff2") format("woff2"); }
  @font-face { font-family: "Open Sans"; font-style: italic; font-weight: 400; font-display: swap; src: url("fonts/open-sans-400i.woff2") format("woff2"); }
  @font-face { font-family: "Open Sans"; font-style: normal; font-weight: 700; font-display: swap; src: url("fonts/open-sans-700.woff2") format("woff2"); }
  @font-face { font-family: "Open Sans"; font-style: italic; font-weight: 700; font-display: swap; src: url("fonts/open-sans-700i.woff2") format("woff2"); }
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { min-height: 100vh; }
  /* The native window owns the chrome; keep the editor toolbar hidden for a
     distraction-free, content-first surface. */
  .vditor-toolbar { display: none !important; }
  /* GitHub-style alert callouts (> [!NOTE] ...). */
  .vditor-reset blockquote.ouro-alert {
    --ouro-alert-color: #59636e;
    border-left-width: 4px !important;
  }
  .vditor-reset blockquote.ouro-alert::before {
    color: var(--ouro-alert-color);
    content: attr(data-ouro-alert-label);
    display: block;
    font-weight: 700;
    margin-bottom: 0.35em;
  }
  .vditor-reset blockquote.ouro-alert .ouro-alert-marker {
    font-size: 0 !important;
    line-height: 0 !important;
    opacity: 0;
    user-select: text;
  }
  .vditor-reset blockquote.ouro-alert.ouro-callout-editing::before { display: none; }
  .vditor-reset blockquote.ouro-alert.ouro-callout-editing .ouro-alert-marker {
    font-size: inherit !important;
    line-height: inherit !important;
    opacity: 0.6;
    user-select: text;
  }
  .vditor-reset blockquote.ouro-alert-note {
    --ouro-alert-color: #0969da;
    border-left-color: #0969da !important;
  }
  .vditor-reset blockquote.ouro-alert-tip {
    --ouro-alert-color: #1a7f37;
    border-left-color: #1a7f37 !important;
  }
  .vditor-reset blockquote.ouro-alert-important {
    --ouro-alert-color: #8250df;
    border-left-color: #8250df !important;
  }
  .vditor-reset blockquote.ouro-alert-warning {
    --ouro-alert-color: #9a6700;
    border-left-color: #9a6700 !important;
  }
  .vditor-reset blockquote.ouro-alert-caution {
    --ouro-alert-color: #cf222e;
    border-left-color: #cf222e !important;
  }
</style>
<!-- Swapped at runtime by the native app to apply the active theme. -->
<style id="ouro-theme"></style>
</head>
<body>
  <div id="editor"></div>
  <script src="vditor/dist/index.min.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
