<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ouro-footnote.XXXXXX.md</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0}
img{max-width:100%;height:auto}
.markdown-body{margin:0 auto;overflow-wrap:break-word;word-wrap:break-word}
:root{color-scheme:light;}
html{font-size:16px;}
body{background:#ffffff;color:#333333;font-family:"Open Sans", "Clear Sans", "Helvetica Neue", Helvetica, Arial, "Segoe UI Emoji", sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;margin:0;}
::selection{background:#b5d6fc;}
.markdown-body{max-width:860px;margin:0 auto;padding:30px 30px 100px;}
@media (min-width:1400px){.markdown-body{max-width:1024px;}}
@media (min-width:1800px){.markdown-body{max-width:1200px;}}
.markdown-body>:first-child{margin-top:0;}
h1,h2,h3,h4,h5,h6{color:#333333;font-weight:bold;line-height:1.4;margin:1rem 0;}
h1{font-size:2.25em;line-height:1.2;border-bottom:1px solid #eeeeee;}
h2{font-size:1.75em;line-height:1.225;border-bottom:1px solid #eeeeee;}
h3{font-size:1.5em;line-height:1.43;}
h4{font-size:1.25em;}
h5{font-size:1em;}
h6{font-size:1em;color:#777777;}
p,blockquote,ul,ol,dl,table{margin:0.8em 0;}
a{color:#4183c4;text-decoration:none;}
a:hover{text-decoration:underline;}
strong{font-weight:bold;}
em{font-style:italic;}
del{color:#777777;}
code{font-family:"Lucida Console", Consolas, Menlo, Monaco, monospace;font-size:0.9em;background:#f3f4f4;border:1px solid #e7eaed;border-radius:3px;padding:0 2px;}
pre{background:#f8f8f8;border:1px solid #e7eaed;border-radius:3px;padding:8px 10px;overflow:auto;line-height:1.5;margin:15px 0;}
pre code{background:none;border:none;padding:0;font-size:0.9em;}
blockquote{padding:0 15px;border-left:4px solid #dfe2e5;color:#777777;}
hr{border:0;height:2px;background:#e7e7e7;margin:16px 0;padding:0;}
ul,ol{padding-left:30px;}
li{margin:0.25em 0;}
.task-list-item{list-style:none;}
.task-list-item input{margin:0 .5em 0 -1.3em;vertical-align:middle;}
table{border-collapse:collapse;width:100%;text-align:left;}
table tr{border:1px solid #dfe2e5;}
table tr:nth-child(2n),thead{background:#f8f8f8;}
th{font-weight:bold;border:1px solid #dfe2e5;border-bottom:0;padding:6px 13px;}
td{border:1px solid #dfe2e5;padding:6px 13px;}
img{max-width:100%;}
</style>
</head>
<body>
<article class="markdown-body">
<p>Body with note<sup id="fnref-alpha"><a href="#fn-alpha" class="footnote-ref">1</a></sup>.</p>
<pre><code class="language-markdown">literal[^alpha]</code></pre>
<section class="footnotes">
<hr>
<ol>
<li id="fn-alpha"><p>Footnote <strong>text</strong>.</p> <a href="#fnref-alpha" class="footnote-backref">&#8617;</a></li>
</ol>
</section>

</article>
</body>
</html>
