name: Bug report
description: Report unexpected Ouro MD behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping harden Ouro MD. Please do not paste private document contents unless you intentionally created a small reproduction.
  - type: input
    id: version
    attributes:
      label: Ouro MD version
      description: Use Ouro MD -> About Ouro MD, or read CFBundleShortVersionString from the app bundle.
      placeholder: "0.9.2"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the action, expected result, and actual result.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Press...
        3. See...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include installer output, screenshots, or a small non-private markdown snippet if useful.
    validations:
      required: false
