name: Release

# Cuts a GitHub release automatically when the version bumps on main.
# To ship: run ./scripts/bump-version.sh <x.y.z>, merge to main, and let
# make-app.sh derive the app version from OuroMDRelease.swift. This builds the
# app, packages the zip + manifest, and publishes v<VERSION>.
# It no-ops if a release for that version already exists, so ordinary merges
# (docs, refactors) don't trigger anything.
#
# Manual dry run: Actions -> Release -> "Run workflow" with dry_run=true builds
# and packages on a real runner and uploads the artifacts to the run WITHOUT
# publishing a release — used to verify the pipeline.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/release.yml'
      - 'make-app.sh'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Sources/**'
      - 'web/**'
      - 'Resources/**'
      - 'scripts/lib/app-version.sh'
      - 'scripts/package-release.sh'
      - 'scripts/check-hosted-installer.sh'
      - 'scripts/check-live-update-path.sh'
      - 'scripts/check-shell-boundary.sh'
      - 'scripts/check-shell-dependency.sh'
      - 'scripts/check-signing-readiness.sh'
      - 'scripts/prepare-ci-signing-assets.sh'
      - 'scripts/sign-notarize-app.sh'
      - 'scripts/pr-preflight.sh'
      - 'scripts/release-policy.sh'
      - 'scripts/run-native-scenarios.sh'
      - 'scripts/run-visual-qa.sh'
      - 'scripts/shell-boundary-allowlist.txt'
      - 'scripts/swift-test-budget.sh'
      - 'scripts/verify-release-version.sh'
      - 'scripts/verify-packaged-app.sh'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + package only; do not publish a release'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select newest Xcode (needs Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$latest" ]; then latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"; fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version

      - name: Read version
        id: ver
        run: |
          version="$(./scripts/verify-release-version.sh --print)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Verify release freshness policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/release-policy.sh freshness --mode main

      - name: Verify release package shell guard
        run: ./scripts/release-policy.sh selftest-package-guards

      - name: Verify live update runner policy
        run: ./scripts/release-policy.sh selftest-live-update-runner

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          exists="$(./scripts/release-policy.sh release-exists --version "${{ steps.ver.outputs.version }}")"
          if [ "$exists" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.ver.outputs.version }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check signing script contracts
        if: steps.check.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && inputs.dry_run)
        run: |
          ./scripts/check-signing-readiness.sh --selftest
          ./scripts/sign-notarize-app.sh --selftest

      - name: Prepare CI signing assets
        if: steps.check.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          OURO_RELEASE_SIGNING_MODE: ${{ secrets.OURO_RELEASE_SIGNING_MODE }}
          OURO_REQUIRE_NOTARIZATION: ${{ secrets.OURO_REQUIRE_NOTARIZATION }}
          OURO_CODESIGN_IDENTITY: ${{ secrets.OURO_CODESIGN_IDENTITY }}
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_CERTIFICATE_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_IDENTITY }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: ./scripts/prepare-ci-signing-assets.sh

      - name: Check signing and notarization readiness
        if: steps.check.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          OURO_RELEASE_SIGNING_MODE: ${{ secrets.OURO_RELEASE_SIGNING_MODE }}
          OURO_REQUIRE_NOTARIZATION: ${{ secrets.OURO_REQUIRE_NOTARIZATION }}
          OURO_CODESIGN_IDENTITY: ${{ secrets.OURO_CODESIGN_IDENTITY }}
          OURO_NOTARY_PROFILE: ${{ secrets.OURO_NOTARY_PROFILE }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/check-signing-readiness.sh

      - name: Package release artifact
        if: steps.check.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          # Production releases fail closed when telemetry is not configured.
          # Dry-run dispatches may build without secrets for fork/inspection use.
          OURO_MD_POSTHOG_KEY: ${{ secrets.OURO_MD_POSTHOG_KEY }}
          OURO_MD_POSTHOG_HOST: ${{ secrets.OURO_MD_POSTHOG_HOST }}
          OURO_MD_ALLOW_UNCONFIGURED_TELEMETRY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '' }}
          OURO_RELEASE_SIGNING_MODE: ${{ secrets.OURO_RELEASE_SIGNING_MODE }}
          OURO_CODESIGN_IDENTITY: ${{ secrets.OURO_CODESIGN_IDENTITY }}
          OURO_NOTARY_PROFILE: ${{ secrets.OURO_NOTARY_PROFILE }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/package-release.sh

      - name: Upload artifacts to the run (always, for inspection / dry run)
        if: steps.check.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && inputs.dry_run)
        uses: actions/upload-artifact@v6
        with:
          name: ouro-md-${{ steps.ver.outputs.version }}
          path: dist/Ouro-MD-${{ steps.ver.outputs.version }}.*

      - name: Publish release
        if: steps.check.outputs.exists == 'false' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            "dist/Ouro-MD-${{ steps.ver.outputs.version }}.zip" \
            "dist/Ouro-MD-${{ steps.ver.outputs.version }}.manifest.json" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Ouro MD ${{ steps.ver.outputs.version }}" \
            --generate-notes

      - name: Verify published release and installer
        if: steps.check.outputs.exists == 'false' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/release-policy.sh verify-published --version "${{ steps.ver.outputs.version }}" --sha "$GITHUB_SHA"
          OURO_MD_EXPECT_VERSION="${{ steps.ver.outputs.version }}" ./scripts/check-hosted-installer.sh
          OURO_MD_LIVE_UPDATE_TO_VERSION="${{ steps.ver.outputs.version }}" ./scripts/check-live-update-path.sh
