name: Shell Dependency Watch

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - ouro-native-apple-app-shell-main-updated
  schedule:
    - cron: '17 11 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: shell-dependency-watch
  cancel-in-progress: false

jobs:
  refresh-shell-dependency:
    if: github.repository == 'ourostack/ouro-md'
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version

      - name: Check shared shell freshness
        id: freshness
        run: |
          set +e
          output="$(./scripts/check-shell-dependency.sh 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$output" | grep -q 'is stale in Package.resolved'; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$status"

      - name: Refresh shared shell dependency
        if: steps.freshness.outputs.stale == 'true'
        run: ./scripts/refresh-shell-dependency.sh

      - name: Validate refresh diff
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --check
          ./scripts/verify-release-version.sh
          ./scripts/check-shell-dependency.sh
          ./scripts/release-policy.sh freshness --mode pr --base-ref origin/main
          ./scripts/release-policy.sh scan .

      - name: Open or update refresh PR
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/ouro-md-refresh-shell-dependency"
          title="Refresh shared shell dependency"
          version="$(./scripts/verify-release-version.sh --print)"
          shell_revision="$(python3 -c 'import json; data=json.load(open("Package.resolved", encoding="utf-8")); print(next(pin.get("state", {}).get("revision", "") for pin in data.get("pins", []) if pin.get("identity") == "ouro-native-apple-app-shell"))')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          have_remote_branch=false
          if git fetch origin "${branch}:refs/remotes/origin/${branch}"; then
            have_remote_branch=true
          fi
          git checkout -B "$branch"
          git add Package.resolved README.md Sources/OuroMDCore/OuroMDRelease.swift
          if git diff --cached --quiet; then
            echo "No refresh diff remains after validation."
            exit 0
          fi
          git commit -m "Refresh shared shell dependency"

          body="$RUNNER_TEMP/ouro-md-shell-refresh-pr.md"
          {
            echo "## Summary"
            echo "- refresh \`ouro-native-apple-app-shell\` to \`${shell_revision}\`"
            echo "- bump Ouro MD to \`${version}\` for the release freshness policy"
            echo
            echo "## Validation"
            echo "- \`./scripts/refresh-shell-dependency.sh\`"
            echo "- \`git diff --check\`"
            echo "- \`./scripts/verify-release-version.sh\`"
            echo "- \`./scripts/check-shell-dependency.sh\`"
            echo "- \`./scripts/release-policy.sh freshness --mode pr --base-ref origin/main\`"
            echo "- \`./scripts/release-policy.sh scan .\`"
          } > "$body"

          repo="${GITHUB_REPOSITORY:-ourostack/ouro-md}"

          write_manual_pr_summary() {
            local reason="$1"
            reason="${reason//$'\n'/ }"
            local compare_url="https://github.com/${repo}/compare/main...${branch}"
            {
              echo "## Shell dependency refresh needs a PR"
              echo
              echo "The refresh branch was pushed successfully, but this workflow could not open or update the pull request automatically."
              echo
              echo "- Reason: ${reason}"
              echo "- Branch: \`${branch}\`"
              echo "- Compare: ${compare_url}"
              echo
              echo "Manual PR command:"
              echo '```sh'
              printf 'gh pr create --repo "%s" --base main --head "%s" --title "%s" --fill\n' "$repo" "$branch" "$title"
              echo '```'
            } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/null}"
          }

          run_pr_command() {
            local action="$1"
            shift
            local output
            local status
            set +e
            output="$("$@" 2>&1)"
            status=$?
            set -e
            printf '%s\n' "$output"
            if [ "$status" -ne 0 ]; then
              write_manual_pr_summary "${action} failed with exit ${status}: ${output}"
              exit 0
            fi
          }

          existing="$(gh pr list --repo "$repo" --head "$branch" --state open --json number --jq '.[0].number // ""')"
          if [ "$have_remote_branch" = "true" ] && [ "$(git rev-parse HEAD^{tree})" = "$(git rev-parse "origin/$branch^{tree}")" ]; then
            if [ -n "$existing" ]; then
              echo "Existing refresh PR #${existing} already has the desired tree; leaving it untouched."
              exit 0
            fi
            echo "Existing refresh branch already has the desired tree, but no open PR was found; creating one."
          else
            git push --force-with-lease origin "$branch"
          fi

          if [ -n "$existing" ]; then
            run_pr_command "updating refresh PR #${existing}" gh pr edit "$existing" --repo "$repo" --title "$title" --body-file "$body"
            run_pr_command "commenting on refresh PR #${existing}" gh pr comment "$existing" --repo "$repo" --body "Updated by Shell Dependency Watch for \`ouro-native-apple-app-shell@${shell_revision}\`."
          else
            run_pr_command "creating refresh PR" gh pr create --repo "$repo" --base main --head "$branch" --title "$title" --body-file "$body"
          fi
