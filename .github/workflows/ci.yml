name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Verify release version contract
        run: ./scripts/verify-release-version.sh
      - name: Verify release freshness policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/release-policy.sh freshness
      - name: Scan source policy
        run: ./scripts/release-policy.sh scan .
      - name: Run tests
        run: swift test

  app-bundle:
    name: App bundle
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Build the app bundle
        run: ./make-app.sh
      - name: Verify packaged app probes
        env:
          OURO_MD_ALLOW_UNCONFIGURED_TELEMETRY: "1"
        run: ./scripts/verify-packaged-app.sh OuroMD.app

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Build
        run: swift build
      - name: Run headless editor harnesses
        run: |
          set -e
          run() { perl -e 'alarm 90; exec @ARGV' .build/debug/ouro-md "$@"; }
          run --undotest
          run --wraptest
          run --renderprobe
          run --codewraptest
          run --visualqatest
          run --visualqatest --visualqa-file Tests/Fixtures/dogfood-visual-surface.md
          run --visualqatest --theme graphite --visualqa-file Tests/Fixtures/dogfood-visual-surface.md
          run --searchrevealtest
          run --uisurfacetest
          run --tablewraptest
          run --tablewraptest --tablewrap-file Tests/Fixtures/dogfood-wide-tables.md
          run --tablewraptest --tablewrap-width 1000 --tablewrap-height 1300 --tablewrap-file Tests/Fixtures/dogfood-wide-tables.md
          run --tablewraptest --tablewrap-width 1400 --tablewrap-height 5000 --tablewrap-file Tests/Fixtures/dogfood-wide-tables.md
          printf '# T\n\n| a | b |\n| - | - |\n| 1 | 2 |\n' > /tmp/rt.md
          run --roundtrip /tmp/rt.md --out /tmp/rt-out.md
          OURO_SELFTEST=1 run

  coverage:
    name: Coverage
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Enforce 100% line+region coverage on OuroMDCore
        run: ./scripts/check-coverage.sh
