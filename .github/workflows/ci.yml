name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Verify release version contract
        run: ./scripts/verify-release-version.sh
      - name: Verify release freshness policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/release-policy.sh freshness
      - name: Verify release policy PR base handling
        run: ./scripts/release-policy.sh selftest-pr-base
      - name: Verify release API fallback
        run: ./scripts/release-policy.sh selftest-release-api-fallback
      - name: Verify release package shell guard
        run: ./scripts/release-policy.sh selftest-package-guards
      - name: Verify shell dependency watch automation
        run: ./scripts/release-policy.sh selftest-shell-dependency-watch
      - name: Verify live update runner policy
        run: ./scripts/release-policy.sh selftest-live-update-runner
      - name: Verify release policy path classification
        run: ./scripts/release-policy.sh selftest-paths
      - name: Verify version bump guard
        run: ./scripts/bump-version.sh --selftest
      - name: Scan source policy
        run: ./scripts/release-policy.sh scan .
      - name: Verify shared shell dependency freshness
        run: ./scripts/check-shell-dependency.sh
      - name: Verify app control deck
        run: ./scripts/check-app-control-deck.py
      - name: Verify shared shell boundary selftest
        run: ./scripts/check-shell-boundary.sh --selftest
      - name: Verify shared shell boundary
        run: ./scripts/check-shell-boundary.sh
      - name: Check signing and notarization readiness
        run: |
          ./scripts/check-signing-readiness.sh
          ./scripts/check-signing-readiness.sh --selftest
          ./scripts/sign-notarize-app.sh --selftest
          ./scripts/prepare-ci-signing-assets.sh
      - name: Run tests
        run: ./scripts/swift-test-budget.sh
      - name: Upload Swift test timings
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: swift-test-timings
          path: |
            .build/ouro-swift-test.log
            .build/ouro-test-timings.tsv

  app-bundle:
    name: App bundle
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Build the app bundle
        run: ./make-app.sh
      - name: Verify packaged app probes
        env:
          OURO_MD_ALLOW_UNCONFIGURED_TELEMETRY: "1"
        run: ./scripts/verify-packaged-app.sh OuroMD.app

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Build
        run: swift build
      - name: Run headless editor harnesses
        env:
          OURO_VISUAL_ARTIFACT_DIR: ${{ runner.temp }}/ouro-md-artifacts/visual-qa
        run: ./scripts/run-native-scenarios.sh
      - name: Upload visual QA artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: native-scenario-visual-artifacts
          path: ${{ runner.temp }}/ouro-md-artifacts

  coverage:
    name: Coverage
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select newest Xcode (Swift 6.0+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
      - name: Enforce 100% line+region coverage on pure support targets
        run: ./scripts/check-coverage.sh
      - name: Upload coverage test timings
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-test-timings
          path: |
            .build/ouro-coverage-swift-test.log
            .build/ouro-coverage-test-timings.tsv
            .build/ouro-coverage.json
